[project]
name = "taskq-py"
version = "0.1.0"
description = "Async-native, Postgres-backed background job library for Python 3.12+"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
authors = [{ name = "AZX, PBC.", email = "oss@azx.io" }]
keywords = ["jobs", "queue", "postgres", "asyncio", "opentelemetry"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "asyncpg>=0.31.0,<1",
    "croniter>=6.2.4",
    "dotenvmodel>=0.5.0,<1",
    "opentelemetry-api>=1.44.0",
    "orjson>=3.11.9",
    "pydantic>=2.13.4,<3",
    "structlog>=26.1.0,<27",
    "typer>=0.27.0,<1",
    "uuid-utils>=0.17.0,<1",
]

[project.scripts]
taskq = "taskq.cli:main"

[project.urls]
Homepage = "https://github.com/AZX-PBC-OSS/TaskQ"
Documentation = "https://AZX-PBC-OSS.github.io/TaskQ/"
Repository = "https://github.com/AZX-PBC-OSS/TaskQ"
Issues = "https://github.com/AZX-PBC-OSS/TaskQ/issues"
Changelog = "https://github.com/AZX-PBC-OSS/TaskQ/blob/main/CHANGELOG.md"

[project.optional-dependencies]
redis = [
    "redis>=8.0.1,<9",
]
fastapi = [
    "fastapi>=0.139.2,<1",
    "humanize>=4.16.0",
    "jinja2>=3.1.6",
    "sse-starlette>=3.4.6",
    "starlette>=1.3.1",
    "uvicorn>=0.51.0,<1",
]
reload = [
    "watchfiles>=1.2.0",
]
otel = [
    # Not imported anywhere under src/taskq; kept optional for operators who
    # export OTLP directly or drive auto-instrumentation via
    # `opentelemetry-instrument`.
    "opentelemetry-sdk>=1.44.0",
    "opentelemetry-exporter-otlp>=1.44.0",
    "opentelemetry-instrumentation>=0.65b0,<1",
]
prometheus = [
    # >=0.63b0 guarantees PrometheusMetricReader's public `registry=` kwarg
    # (opentelemetry-python #5055); earlier releases hard-coded the global
    # REGISTRY, which is not safe for isolated metric scrapes.
    "opentelemetry-exporter-prometheus>=0.63b0,<1",
    "prometheus-client>=0.25.0,<1",
]
oidc = [
    # OAuth2/OIDC client, discovery, and JWT/JWKS validation. Vendor-neutral —
    # works against any OIDC provider (Entra, Okta, Auth0, Google); no vendor SDK.
    "authlib>=1.7.2",
    # HTTP client for authlib's AsyncOAuth2Client (subclasses httpx.AsyncClient
    # for the OAuth2 token-exchange flow). authlib does not declare httpx as a
    # hard dependency, so it must be listed here explicitly.
    "httpx>=0.28.1,<1",
    # HTTP client for direct OIDC calls (discovery, JWKS fetch). httpx2 is the
    # Pydantic-maintained successor to httpx with the same API surface.
    "httpx2>=2.7.0",
    # Signed session cookies (shared with the SAML backend via _session.py).
    "itsdangerous>=2.2.0,<3",
]
saml = [
    # OneLogin SP toolkit; xmlsec ships self-contained wheels on common platforms
    # (manylinux/musllinux/macos/windows) — no system libxmlsec1 needed there.
    # See docs/guides/sso.md for platform-specific notes.
    "python3-saml>=1.16.0",
    # Shared signed session cookies via _session.py.
    "itsdangerous>=2.2.0,<3",
]
aad = [
    # Microsoft Entra ID (AAD) managed-identity authentication for Azure
    # Database for PostgreSQL and Azure Cache for Redis. Used by the
    # credential providers in taskq.aad; see docs/guides/managed-identities.md.
    "azure-identity>=1.25.3,<2",
    # Async transport for azure.identity.aio credentials — azure-identity
    # treats aiohttp as a soft dependency, but constructing any async
    # credential (e.g. aio.DefaultAzureCredential) raises ImportError
    # without it.
    "aiohttp>=3.14.2,<4",
]
aws = [
    # AWS IAM database authentication for Amazon RDS Postgres. Used by the
    # credential providers in taskq.aws; see docs/guides/managed-identities.md.
    "boto3>=1.43.52,<2",
]
vault = [
    # HashiCorp Vault database secrets engine dynamic credentials. Used by
    # the credential providers in taskq.vault; see docs/guides/managed-identities.md.
    "hvac>=2.4.0,<3",
]

[tool.uv]
# Supply-chain hardening: never resolve to distributions published within the
# last 24 hours, giving time for malicious releases to be detected and yanked.
exclude-newer = "24 hours"
# dotenvmodel is published by the same org (AZX-PBC-OSS) as TaskQ and is the
# only same-org dependency. Opt it out of the 24-hour supply-chain quarantine
# so same-day releases can be adopted immediately; this is deliberate and
# scoped to dotenvmodel only (every other dep still honors the cooldown).
# markupsafe is excluded from cooldown for the same reason as dotenvmodel —
# it's a transitive of pydantic that we pin tightly and audit.
exclude-newer-package = { dotenvmodel = "0d", markupsafe = false }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taskq"]

[tool.hatch.build.targets.sdist]
include = ["src/taskq", "examples", "README.md", "LICENSE", "pyproject.toml"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests", "examples"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "N",     # pep8-naming
    "ASYNC", # flake8-async (PEP 789 async-safety hazards)
    "S",     # bandit
    "C4",    # comprehensions
    "SIM",   # simplify
    "RUF",   # ruff-specific
]
ignore = [
    "S101",  # assert in tests
    "E501",  # long lines (formatter handles)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106"]
"tests/test_workgroup.py" = ["S108", "ASYNC110"]
# Exception class names follow the project glossary verbatim
# (Snooze, RetryAfter, ResultTooLarge, ScopeViolation, etc.).
"src/taskq/exceptions.py" = ["N818"]
# ASYNC109: _consume_transactional and _consume_autonomous accept a
# pre-computed start_to_close timeout from the job row; this is not a
# user-facing async-with-timeout API — the timeout is consumed
# internally by asyncio.wait_for, not exposed as an alternative to
# asyncio.timeout(). SIM117: loop_conn.transaction() wrapping the
# actor body + mark_succeeded_with_conn cannot be flattened into a
# combined async-with because the conn is a parameter, not acquired
# from a pool inside the function.
"src/taskq/worker/_consumer.py" = ["ASYNC109", "SIM117"]
# Schema name is validated against _IDENT_RE before interpolation; bandit
# cannot trace that across function boundaries. asyncpg has no parameter
# binding for identifiers, so we have to interpolate.
"src/taskq/migrate.py" = ["S608"]
# Schema name is validated against _IDENT_RE before interpolation; same
# rationale as migrate.py.  All user-supplied values use $N parameter
# binding — only the schema identifier is interpolated, and it is
# validated at construction time.
"src/taskq/backend/postgres.py" = ["S608", "SIM117"]
# S608: schema name is validated against _IDENT_RE before interpolation; same
# rationale as migrate.py.  All user-supplied values use $N parameter binding.
# SIM117: pool.acquire() and conn.transaction() cannot be flattened into a
# single async-with because conn is not bound until after the first __aenter__.
"src/taskq/backend/_terminal.py" = ["S608", "SIM117"]
"src/taskq/backend/_enqueue.py" = ["S608", "SIM117"]
"src/taskq/backend/_reads.py" = ["S608"]
"src/taskq/backend/_dispatch.py" = ["S608", "SIM117"]
"src/taskq/backend/_sql_templates.py" = ["S608"]
# SIM117: pool.acquire() and conn.transaction() cannot be flattened into a
# single async-with because conn is not bound until after the first __aenter__.
# Schema name is validated against _IDENT_RE before interpolation; same
# rationale as migrate.py.  All user-supplied values use $N parameter
# binding.
# Schema name is validated against _IDENT_RE before interpolation; same
# rationale as migrate.py.  All user-supplied values use $N parameter
# binding — only the schema identifier is interpolated.
# Schema name is validated against _IDENT_RE before interpolation; same
# rationale as migrate.py.  All user-supplied values use $N parameter
# binding — only the schema identifier is interpolated, and it is
# validated at construction time.
"src/taskq/worker/dispatch.py" = ["S608"]
"tests/test_postgres_terminal_writes.py" = ["S608"]
# Same rationale as test_postgres_terminal_writes.py — schema name is
