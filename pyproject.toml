"tests/test_ratelimit_reservation_chaos.py" = ["S608", "ASYNC109", "S110"]
# Schema name validated against _IDENT_RE before interpolation; same as above.
"tests/test_integration_fixtures.py" = ["S608"]
# Same rationale — schema name is a worker-scoped constant derived from
# PYTEST_XDIST_WORKER; all user-supplied values use $N parameter binding.
"tests/test_worker_bootstrap.py" = ["S608"]
# ASYNC109: fake_connect mirrors asyncpg.connect(timeout=...) signature; the
# `timeout` parameter is part of the mocked API surface, not a missing timeout
# context-manager pattern.
"tests/test_heartbeat_isolate.py" = ["ASYNC109"]
# S311: random.Random used for timing jitter in backoff tests, not
# cryptographic purposes.
"tests/test_retry_backoff.py" = ["S311"]
# ASYNC109: timeout parameter mirrors asyncpg Connection API — cannot
# use asyncio.timeout in a wrapper that delegates to the real connection.
"src/taskq/testing/asyncpg_chaos.py" = ["ASYNC109"]
# S608: schema name validated against _IDENT_RE before interpolation;
# asyncpg cannot bind identifiers as parameters.
"src/taskq/worker/cron_loop.py" = ["S608"]
# F822: _main is lazily re-exported via __getattr__, not a module-level name.
"src/taskq/worker/run.py" = ["F822"]
# Typer's declarative Option() metadata in argument defaults is a standard
# pattern (not a mutable-default hazard). Every command would trigger B008.
"src/taskq/cli.py" = ["B008"]
# FastAPI Depends() in route handler signatures is the idiomatic injection
# pattern; like Typer Option(), it is declarative metadata, not a real
# mutable default.  S608: schema name is validated against _IDENT_RE before
# interpolation in create_router(); same rationale as migrate.py.  All
# user-supplied values use $N parameter binding — only the schema identifier
# is interpolated.
"src/taskq/web/admin/*.py" = ["B008", "S608"]
# FastAPI Depends() in SSO auth route handlers — same declarative-injection
# rationale as web/admin/*.py.  B008: Depends() in defaults.  The auth package
# guards authlib/python3-saml imports inside factory functions so importing
# taskq.web.admin.auth never crashes when the extras are absent.
"src/taskq/web/admin/auth/*.py" = ["B008"]
# FastAPI Depends() in progress router factory — same rationale as web/admin.
# S608: schema name is validated against _IDENT_RE before interpolation via
# _PROGRESS_SQL.format(schema=_schema); same rationale as migrate.py.  All
# user-supplied values use $N parameter binding — only the schema identifier
# is interpolated.
"src/taskq/web/progress.py" = ["B008", "S608"]
# FastAPI Depends() in example route handlers is the same idiomatic injection
# pattern as web/admin — declarative metadata, not a real mutable default.
"examples/*.py" = ["B008"]
"examples/fastapi_app/*.py" = ["B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
include = ["src", "tests", "examples"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
reportUnknownMemberType = false
venvPath = "."
venv = ".venv"

[[tool.pyright.executionEnvironments]]
root = "src/taskq/testing"
reportPrivateUsage = false

[[tool.pyright.executionEnvironments]]
root = "src/taskq/ratelimit"
reportPrivateUsage = false

[[tool.pyright.executionEnvironments]]
root = "src/taskq/worker"
reportPrivateUsage = false
reportUnsupportedDunderAll = false

# SSO auth backends bind to untyped third-party libraries (authlib/joserfc,
# python3-saml/onelogin) that ship no type stubs. Relax the unknown-type
# reports at this boundary so pyright strict doesn't flag every call into
# those libraries; structural correctness is covered by the test suite.
[[tool.pyright.executionEnvironments]]
root = "src/taskq/web/admin/auth"
reportPrivateUsage = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownMemberType = false

# taskq.aad binds to azure-identity, which ships no type stubs. Same
# rationale as the SSO auth boundary — relax unknown-type reports at this
# import boundary; structural correctness is covered by the test suite.
[[tool.pyright.executionEnvironments]]
root = "src/taskq/aad.py"
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportMissingImports = false

# taskq.aws binds to boto3, which ships no type stubs. Same rationale.
[[tool.pyright.executionEnvironments]]
root = "src/taskq/aws.py"
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportMissingImports = false

# taskq.vault binds to hvac, which ships no type stubs. Same rationale.
[[tool.pyright.executionEnvironments]]
root = "src/taskq/vault.py"
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportMissingImports = false

[[tool.pyright.executionEnvironments]]
root = "tests"
reportPrivateUsage = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportArgumentType = false
reportMissingImports = false
reportUnknownVariableType = false

[[tool.pyright.executionEnvironments]]
root = "examples"
reportArgumentType = false
reportMissingImports = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownParameterType = false
reportUnknownLambdaType = false
reportUntypedFunctionDecorator = false

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
asyncio_default_test_loop_scope = "module"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--dist=loadgroup",
    "--timeout=300",
]
filterwarnings = [
    "ignore::DeprecationWarning:testcontainers.*",
    "ignore::DeprecationWarning:redis.*",
    "ignore::DeprecationWarning:onelogin.*",
]
markers = [
    "slow: marks tests as slow (skip with -m 'not slow')",
    "integration: marks tests requiring testcontainers",
    "redis: marks tests requiring the [redis] extra and a Redis container",
    "examples: marks tests for the example app (excluded from default CI run)",
]

[tool.coverage.run]
source = ["src/taskq"]
branch = true
omit = ["tests/*", "**/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
    "def __repr__",
    "@abstractmethod",
]

[dependency-groups]
dev = [
    "anyio>=4.14.2",
    "asyncpg-stubs>=0.31.3",
    "authlib>=1.7.2",
    "httpx>=0.28.1",
    "httpx2>=2.7.0",
    "hypothesis>=6.157.1",
    "itsdangerous>=2.2.0",
    "jsonschema>=4.26.0",
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.7.7",
    "mkdocstrings[python]>=1.0.6",
    "opentelemetry-sdk>=1.44.0",
    "pip-audit>=2.10.1",
    "pyright>=1.1.411",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
    "python-multipart>=0.0.32",
    "pyyaml>=6.0.3",
    "respx>=0.23.1",
    "ruff>=0.15.22",
    "testcontainers[postgres,redis]>=4.14.2",
]
