name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      attestations:
        description: >-
          Generate Sigstore attestations. Reusable-workflow callers must pass
          false: PyPI rejects attestations whose certificate records the
          top-level (caller) workflow, and the callee cannot detect that case
          itself because the github context follows the caller.
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build and publish (e.g. v0.2.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject.toml version
        env:
          TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME#v}"
          version="$(uv run python -c 'import importlib.metadata; print(importlib.metadata.version("taskq-py"))')"
          echo "Tag: ${tag}"
          echo "pyproject.toml version: ${version}"
          if [ "${tag}" != "${version}" ]; then
            echo "::error::Git tag ${tag} does not match pyproject.toml version ${version}"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Assert wheel ships required non-code artifacts
        run: |
          set -euo pipefail
          listing="$(uv run python -m zipfile -l dist/*.whl)"
          echo "$listing" | grep -q "taskq/py.typed"
          echo "$listing" | grep -q "taskq/migrations/01.00.00_01_pre_initial.sql"
          echo "$listing" | grep -q "taskq/web/templates/"

      - name: Test installation from wheel
        run: |
          uv venv test-env
          uv pip install --python test-env/bin/python dist/*.whl
          cd /tmp && $GITHUB_WORKSPACE/test-env/bin/python -c "import taskq; print(taskq.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-dist
          path: dist/
          retention-days: 7

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/taskq-py/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Attestations are only valid when publish.yml is the top-level
          # workflow: the Sigstore certificate's Build Config URI records the
          # top-level workflow, and PyPI verifies it against the trusted
          # publisher (publish.yml). release-please.yml therefore passes
          # attestations: false; direct tag pushes and manual dispatches run
          # top-level and keep full attestations via the input default.
          attestations: ${{ inputs.attestations }}

# Trusted Publishing (OIDC): no API token is stored in this repo.
# The PyPI trusted publisher is configured for:
#   Repository: AZX-PBC-OSS/TaskQ
#   Workflow: publish.yml
#   Environment: (Any)
# This workflow is invoked three ways:
#   1. Direct push of a v* tag (manual fallback path) — attestations ON.
#   2. workflow_call from release-please.yml after release-please creates a
#      release (tags made with GITHUB_TOKEN don't trigger push workflows, so
#      release-please.yml calls this workflow explicitly) — attestations OFF,
#      passed explicitly by the caller. NB: inside a reusable workflow the
#      github context belongs to the CALLER (github.event_name is the
#      caller's trigger event), so this workflow cannot detect the case
#      itself; the decision must arrive as an input.
#   3. workflow_dispatch with an existing tag name (manual republish, e.g.
#      recovering a failed automated publish) — attestations ON.
# The PyPI publisher stays valid for all paths because it targets
# publish.yml — the file containing the publish job. For reusable-workflow
# calls, PyPI matches the OIDC token against the called workflow's filename
# (job_workflow_ref), which is still this one. Sigstore attestations are the
# exception: their certificate records the TOP-LEVEL workflow, so they are
# only enabled when publish.yml runs top-level (paths 1 and 3).
# See https://docs.pypi.org/trusted-publishers/ for setup details.
