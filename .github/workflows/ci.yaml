name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Type check with pyright
        run: uv run pyright src/taskq

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        # Leg 1 (--all-extras): every optional extra installed, including
        #   redis, oidc, and saml — runs the full SSO (OIDC + SAML) test
        #   suite for real, not skipped.
        # Leg 2 (otel+fastapi+prometheus+reload, "without redis"):
        #   deliberately omits redis, oidc, and saml to verify graceful
        #   degradation — the SSO tests correctly `pytest.importorskip`
        #   rather than failing when those extras aren't installed (note:
        #   authlib/httpx2/itsdangerous are already present via the `dev`
        #   group regardless of extras, so this leg still exercises the OIDC
        #   code path; python3-saml is not in `dev`, so SAML tests are
        #   skipped here specifically).
        # Leg 3 (oidc+fastapi only): confirms `taskq[oidc]` works in
        #   isolation, without otel/prometheus/reload/saml/redis installed —
        #   the exact combination the docs recommend
        #   (`uv add "taskq[fastapi,oidc]"`).
        # Leg 4 (saml+fastapi only): same, for `taskq[saml]` in isolation —
        #   confirms the SAML backend doesn't accidentally depend on
        #   anything from the oidc/otel/prometheus extras.
        extras:
          [
            "--all-extras",
            "--extra otel --extra fastapi --extra prometheus --extra reload",
            "--extra oidc --extra fastapi",
            "--extra saml --extra fastapi",
          ]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync ${{ matrix.extras }} --group dev

      - name: Run tests (with redis)
        if: matrix.extras == '--all-extras'
        run: uv run pytest -n 2

      - name: Run tests (without redis)
        if: matrix.extras != '--all-extras'
        run: uv run pytest -n 2 -m "not redis"

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run tests with coverage gate
        run: uv run pytest -n 2 --cov=taskq --cov-report=term-missing --cov-fail-under=90

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Check package contents
        run: |
          ls -la dist/
          uv run python -m tarfile -l dist/*.tar.gz
          uv run python -m zipfile -l dist/*.whl

      - name: Assert wheel ships required non-code artifacts
        run: |
          set -euo pipefail
          listing="$(uv run python -m zipfile -l dist/*.whl)"
          echo "$listing" | grep -q "taskq/py.typed"
          echo "$listing" | grep -q "taskq/migrations/01.00.00_01_pre_initial.sql"
          echo "$listing" | grep -q "taskq/web/templates/"

      - name: Test installation from wheel
        run: |
          uv venv test-env
          uv pip install --python test-env/bin/python dist/*.whl
          cd /tmp && $GITHUB_WORKSPACE/test-env/bin/python -c "import taskq; print(taskq.__version__)"

      - name: Test installation from source distribution
        run: |
          uv venv test-src-env
          uv pip install --python test-src-env/bin/python dist/*.tar.gz
          cd /tmp && $GITHUB_WORKSPACE/test-src-env/bin/python -c "import taskq; print(taskq.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

# Future work: run the `test` job's integration tier against a matrix of
# PostgreSQL major versions (currently only tested against PG 18 via
# testcontainers' default image). Deferred for now — cost/time tradeoff.
